<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Command Center | Promptlier</title>

  <link rel="stylesheet" href="css/global.css">

  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <style>
    /* =========================================
       ADMIN DASHBOARD STYLES
       ========================================= */
    .admin-container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 24px;
    }

    .admin-header {
      margin-bottom: 40px;
      text-align: center;
    }

    .admin-header h1 {
      font-size: clamp(2rem, 4vw, 2.5rem);
      margin-bottom: 10px;
    }

    .admin-header p {
      color: var(--text-muted);
    }

    /* THE TAB SYSTEM */
    .admin-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 30px;
      background: var(--bg-surface);
      padding: 8px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
    }

    .tab-btn {
      flex: 1;
      padding: 12px 10px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .tab-btn.active {
      background: var(--text-main);
      color: var(--bg-main);
    }

    .tab-btn:hover:not(.active) {
      background: var(--bg-surface-hover);
      color: var(--text-main);
    }

    /* FORM STYLING */
    .admin-form {
      background: var(--bg-surface);
      padding: 40px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      display: none;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .admin-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: var(--font-main);
      transition: var(--transition);
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.1);
    }

    .form-textarea {
      min-height: 150px;
      resize: vertical;
    }

    /* FILE UPLOAD STYLING */
    .file-upload-wrapper {
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-sm);
      padding: 40px 20px;
      text-align: center;
      background: var(--bg-main);
      transition: var(--transition);
      cursor: pointer;
      display: block;
    }

    .file-upload-wrapper:hover {
      border-color: var(--accent);
      background: rgba(0, 229, 255, 0.02);
    }

    .file-upload-wrapper input[type="file"] {
      display: none;
    }

    .upload-text {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .upload-text span {
      color: var(--accent);
      font-weight: 600;
    }

    /* CUSTOM DARK MODE FOR QUILL EDITOR */
    .ql-toolbar.ql-snow {
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-top-left-radius: var(--radius-sm);
      border-top-right-radius: var(--radius-sm);
    }

    .ql-container.ql-snow {
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: var(--radius-sm);
      border-bottom-right-radius: var(--radius-sm);
      font-family: var(--font-main);
      font-size: 1rem;
      color: var(--text-main);
      height: 400px;
    }

    .ql-snow .ql-stroke {
      stroke: var(--text-muted);
    }

    .ql-snow .ql-fill,
    .ql-snow .ql-stroke.ql-fill {
      fill: var(--text-muted);
    }

    .ql-snow .ql-picker {
      color: var(--text-muted);
    }

    .ql-snow.ql-toolbar button:hover .ql-stroke,
    .ql-snow.ql-toolbar button.ql-active .ql-stroke,
    .ql-snow .ql-picker-label:hover .ql-stroke {
      stroke: var(--accent) !important;
    }

    .ql-snow.ql-toolbar button:hover .ql-fill,
    .ql-snow.ql-toolbar button.ql-active .ql-fill {
      fill: var(--accent) !important;
    }

    .ql-snow .ql-picker-label:hover {
      color: var(--accent);
    }

    .ql-editor.ql-blank::before {
      color: var(--text-muted);
      font-style: italic;
    }

    /* MANAGE TABLES STYLING */
    .manage-table-wrapper {
      overflow-x: auto;
    }

    .manage-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .manage-table th {
      padding: 16px;
      border-bottom: 2px solid var(--border-color);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .manage-table td {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      vertical-align: middle;
    }

    .manage-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .item-thumb {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: var(--radius-sm);
    }

    .action-btn {
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: none;
      font-weight: 600;
      margin-right: 8px;
      transition: var(--transition);
    }

    .btn-edit {
      background: var(--bg-surface-hover);
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-edit:hover {
      background: var(--text-main);
      color: var(--bg-main);
    }

    .btn-delete:hover {
      background: #ef4444;
      color: #fff;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-brand">Prompt<span>lier</span> Admin</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Back to Site</a>
      <button class="btn btn-outline" id="navLogoutBtn">Log Out</button>
    </div>
  </nav>

  <main class="admin-container">

    <div class="admin-header">
      <h1>Command Center</h1>
      <p>Manage, create, and update your content platform.</p>
    </div>

    <div class="admin-tabs">
      <button class="tab-btn active" data-target="promptForm">Add Prompt</button>
      <button class="tab-btn" data-target="articleForm">Add Article</button>
      <button class="tab-btn" data-target="managePrompts" id="loadPromptsBtn">Manage Prompts</button>
      <button class="tab-btn" data-target="manageArticles" id="loadArticlesBtn">Manage Articles</button>
    </div>

    <form class="admin-form active" id="promptForm">
      <input type="hidden" id="editPromptId" value="">

      <div class="form-group">
        <label class="form-label">Upload Generated Image (Leave blank to keep existing image when editing)</label>
        <label class="file-upload-wrapper">
          <input type="file" id="promptImage" accept="image/webp, image/jpeg, image/png">
          <div class="upload-text"><span>Click to browse</span> or drag and drop image here</div>
          <div style="font-size: 0.8rem; margin-top: 8px; color: #666;">Max 5MB (WebP strongly recommended)</div>
        </label>
      </div>

      <div class="form-group">
        <label class="form-label">Prompt Title</label>
        <input type="text" class="form-input" id="promptTitle" placeholder="e.g. Cinematic Neon Portrait" required>
      </div>

      <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
          <label class="form-label">Category</label>
          <select class="form-select" id="promptCategory">
            <option value="Portrait">Portrait</option>
            <option value="Landscape">Landscape</option>
            <option value="Macro">Macro</option>
            <option value="Architecture">Architecture</option>
            <option value="Fashion">Fashion</option>
            <option value="Cinematic">Cinematic</option>
            <option value="Analog Film">Analog Film</option>
            <option value="Anime">Anime</option>
            <option value="3D Render">3D Render</option>
            <option value="Food">Food</option>
          </select>
        </div>
        <div>
          <label class="form-label">AI Model / Software</label>
          <input type="text" class="form-input" id="promptModel" placeholder="e.g. Midjourney v6" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">The Full Prompt (50-100 words)</label>
        <textarea class="form-textarea" id="promptText" placeholder="Paste the exact prompt here..."
          required></textarea>
      </div>

      <button type="button" class="btn btn-primary" id="savePromptBtn" style="width: 100%; padding: 16px;">Publish New
        Prompt</button>
      <button type="button" class="btn btn-outline" id="cancelPromptEditBtn"
        style="width: 100%; padding: 12px; margin-top: 10px; display: none;">Cancel Editing</button>
    </form>


    <form class="admin-form" id="articleForm">
      <input type="hidden" id="editArticleId" value="">

      <div class="form-group">
        <label class="form-label">Upload Article Cover Image (Leave blank to keep existing image when editing)</label>
        <label class="file-upload-wrapper">
          <input type="file" id="articleCover" accept="image/webp, image/jpeg, image/png">
          <div class="upload-text"><span>Click to browse</span> or drag and drop cover image</div>
        </label>
      </div>

      <div class="form-group">
        <label class="form-label">Article Title</label>
        <input type="text" class="form-input" id="articleTitle" placeholder="e.g. Mastering Lighting in Midjourney v6"
          required>
      </div>

      <div class="form-group">
        <label class="form-label">URL Slug (For SEO)</label>
        <input type="text" class="form-input" id="articleSlug" placeholder="e.g. mastering-lighting-midjourney-v6"
          required>
        <div style="font-size: 0.8rem; margin-top: 6px; color: var(--text-muted);">This becomes
          promptlier.com/blog/<strong>your-slug-here</strong></div>
      </div>

      <div class="form-group">
        <label class="form-label">Meta Description (1-2 sentences)</label>
        <textarea class="form-textarea" id="articleMeta" style="min-height: 80px;"
          placeholder="Stop getting flat images. Learn the 5 keywords..." required></textarea>
      </div>

      <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <label class="form-label" style="margin: 0;">Article Body</label>
          <button type="button" id="toggleHtmlBtn" class="btn btn-outline"
            style="padding: 4px 10px; font-size: 0.8rem; cursor: pointer;">&lt;/&gt; Edit HTML</button>
        </div>

        <div id="quillEditor"></div>

        <textarea id="rawHtmlEditor" class="form-textarea"
          style="display: none; height: 400px; font-family: monospace; color: var(--accent); background: #050505; border: 1px solid var(--border-color);"></textarea>
      </div>

      <button type="button" class="btn btn-primary" id="saveArticleBtn" style="width: 100%; padding: 16px;">Publish New
        Article</button>
      <button type="button" class="btn btn-outline" id="cancelArticleEditBtn"
        style="width: 100%; padding: 12px; margin-top: 10px; display: none;">Cancel Editing</button>
    </form>


    <div class="admin-form" id="managePrompts">
      <h2 style="margin-bottom: 20px;">Existing Prompts</h2>
      <div class="manage-table-wrapper">
        <table class="manage-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Title</th>
              <th>Category</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="promptsTableBody">
            <tr>
              <td colspan="5" style="text-align:center;">Loading prompts...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>


    <div class="admin-form" id="manageArticles">
      <h2 style="margin-bottom: 20px;">Existing Articles</h2>
      <div class="manage-table-wrapper">
        <table class="manage-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Slug</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="articlesTableBody">
            <tr>
              <td colspan="4" style="text-align:center;">Loading articles...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

  <script src="js/supabase-client.js"></script>
  <script src="js/global.js"></script>

  <script>
    // 1. DYNAMIC TAB SWITCHING LOGIC
    const tabs = document.querySelectorAll('.tab-btn');
    const forms = document.querySelectorAll('.admin-form');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        forms.forEach(f => f.classList.remove('active'));

        tab.classList.add('active');
        const targetId = tab.getAttribute('data-target');
        document.getElementById(targetId).classList.add('active');
      });
    });

    // 2. INITIALIZE QUILL RICH TEXT EDITOR
    const toolbarOptions = [
      [{ 'header': [1, 2, 3, false] }],
      ['bold', 'italic', 'underline', 'strike'],
      ['blockquote', 'code-block'],
      [{ 'list': 'ordered' }, { 'list': 'bullet' }],
      [{ 'align': [] }],
      ['link', 'image'],
      ['clean']
    ];

    const quill = new Quill('#quillEditor', {
      theme: 'snow',
      placeholder: 'Write your masterpiece here... Highlight text to format.',
      modules: { toolbar: toolbarOptions }
    });

    // 3. TOGGLE HTML VIEW LOGIC
    const toggleHtmlBtn = document.getElementById('toggleHtmlBtn');
    const quillEditorDiv = document.getElementById('quillEditor');
    const rawHtmlEditor = document.getElementById('rawHtmlEditor');
    const quillToolbar = document.querySelector('.ql-toolbar');

    window.isHtmlMode = false;

    toggleHtmlBtn.addEventListener('click', () => {
      window.isHtmlMode = !window.isHtmlMode;

      if (window.isHtmlMode) {
        // Switch TO HTML Mode
        rawHtmlEditor.value = quill.root.innerHTML;
        quillEditorDiv.style.display = 'none';
        quillToolbar.style.display = 'none';
        rawHtmlEditor.style.display = 'block';

        toggleHtmlBtn.innerHTML = '👁️ Visual Editor';
        toggleHtmlBtn.style.backgroundColor = 'var(--accent)';
        toggleHtmlBtn.style.color = '#000';
        toggleHtmlBtn.style.borderColor = 'var(--accent)';
      } else {
        // Switch TO Visual Mode
        quill.clipboard.dangerouslyPasteHTML(rawHtmlEditor.value);
        rawHtmlEditor.style.display = 'none';
        quillEditorDiv.style.display = 'block';
        quillToolbar.style.display = 'block';

        toggleHtmlBtn.innerHTML = '&lt;/&gt; Edit HTML';
        toggleHtmlBtn.style.backgroundColor = 'transparent';
        toggleHtmlBtn.style.color = 'var(--text-main)';
        toggleHtmlBtn.style.borderColor = 'var(--border-color)';
      }
    });
  </script>

  <script src="js/admin.js"></script>

</body>

</html>
