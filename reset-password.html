<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Promptlier</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="css/global.css">
    <style>
        .reset-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 420px;
            padding: 40px 36px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
        }

        .reset-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .reset-card>p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .reset-form-group {
            margin-bottom: 18px;
        }

        .reset-form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 7px;
        }

        .reset-form-group input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 13px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: var(--font-main);
            transition: var(--transition);
        }

        .reset-form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.1);
        }

        .reset-status {
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            margin-bottom: 18px;
            display: none;
            line-height: 1.5;
        }

        .reset-status.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
            display: block;
        }

        .reset-status.success {
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.35);
            color: var(--accent);
            display: block;
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 6px;
        }

        .reset-back-link {
            display: block;
            margin-top: 20px;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .reset-back-link a {
            color: var(--accent);
            font-weight: 600;
        }

        .reset-back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-brand">Prompt<span>lier</span></div>
    </nav>

    <div class="reset-wrapper">
        <div class="reset-card">
            <h1>Set New Password</h1>
            <p>Choose a strong password for your Promptlier account.</p>

            <div class="reset-status" id="resetStatus"></div>

            <div class="reset-form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="Min. 8 characters" autocomplete="new-password">
            </div>
            <div class="reset-form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your new password"
                    autocomplete="new-password">
            </div>

            <button class="btn btn-primary reset-btn" id="resetSubmitBtn">Update Password</button>

            <p class="reset-back-link"><a href="index.html">← Back to Home</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        function setStatus(type, msg) {
            const el = document.getElementById('resetStatus');
            el.className = `reset-status ${type}`;
            el.textContent = msg;
        }

        document.getElementById('resetSubmitBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetSubmitBtn');

            if (!newPassword || !confirmPassword) {
                setStatus('error', '⚠️ Please fill in both password fields.');
                return;
            }
            if (newPassword.length < 8) {
                setStatus('error', '🔒 Password must be at least 8 characters long.');
                return;
            }
            if (newPassword !== confirmPassword) {
                setStatus('error', '❌ Passwords do not match. Please try again.');
                return;
            }

            btn.textContent = 'Updating…';
            btn.disabled = true;

            const { error } = await window.supabaseClient.auth.updateUser({ password: newPassword });

            if (error) {
                setStatus('error', '⚠️ ' + (error.message || 'Could not update password. Please try again.'));
                btn.textContent = 'Update Password';
                btn.disabled = false;
            } else {
                setStatus('success', '✅ Password updated successfully! Redirecting you to the homepage…');
                btn.textContent = 'Done!';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        });
    </script>
</body>

</html>
